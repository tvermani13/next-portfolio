# Build static site and publish to GitHub Pages on every push to `main`.
# Repo settings → Pages → Build and deployment: set Source to "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Resolve base path and public site URL
        id: pages
        shell: bash
        run: |
          repo="${{ github.event.repository.name }}"
          owner="${{ github.repository_owner }}"
          rlc="${repo,,}"
          olc="${owner,,}"
          if [ "$rlc" = "$olc.github.io" ]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${olc}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${repo}" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${olc}.github.io/${repo}" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.site_url }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
